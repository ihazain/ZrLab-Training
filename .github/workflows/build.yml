name: Build Training Plan

on:
  push:
    paths:
      - 'data.json'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build index.html from data.json
        run: python3 build.py

      - name: Commit and push updated index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "rebuild index.html from data.json [skip ci]"
          git push
